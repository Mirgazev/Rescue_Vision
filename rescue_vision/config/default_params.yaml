# =====================================================================
# default_params.yaml — параметры узла rescue_vision_node по умолчанию
# =====================================================================
# Полностью соответствует Таблице 7 ВКР Миргазева М.А., 2026.
# Используется через launch-файлы pipeline_realsense.launch.py и
# pipeline_rosbag.launch.py:
#
#     parameters=[
#         LaunchConfiguration('params_file'),  # ← этот файл
#         { ... аргументы командной строки ... },
#     ]
#
# Параметры командной строки имеют приоритет над значениями из YAML.
# =====================================================================

rescue_vision_node:
  ros__parameters:

    # --------------------------------------------------------------
    # Параметры модели (Таблица 7 ВКР, подраздел 3.8)
    # --------------------------------------------------------------
    model_path: weights/best.pt
    device: cuda:0                   # cuda:0 | cuda:1 | cpu

    # Размер input image для YOLO. В подразделе 4.8 ВКР показано,
    # что 768 — оптимальный компромисс между mAP и FPS на RTX 2060.
    imgsz: 768

    # Пороги детектирования. Значения 0.25 / 0.5 — стандартные для
    # COCO-style оценок и совпадают с Таблицами 11-13 ВКР.
    conf_threshold: 0.25
    iou_threshold: 0.5

    # --------------------------------------------------------------
    # Параметры улучшения и трекинга
    # --------------------------------------------------------------
    # off | night | fog | smoke | rain | auto
    # auto — автоматический выбор через ImprovedSceneAnalyzer
    enhance_mode: auto

    # FP16 на GPU. Согласно Таблице 5 ВКР, FP16 даёт ~+50-100%
    # к производительности при минимальной потере точности.
    use_half_precision: true

    # Имя ByteTrack-конфигурации. Если файл лежит в package share/
    # config/, Ultralytics найдёт его автоматически.
    tracker_config: bytetrack.yaml

    # --------------------------------------------------------------
    # Топики и debug
    # --------------------------------------------------------------
    input_topic: /camera/color/image_raw

    # Публикация отладочного изображения (с нарисованными bbox).
    # В штатном запуске на роботе — false для экономии ресурсов.
    # В режиме отладки (rosbag, sim) — true.
    publish_debug_image: false
