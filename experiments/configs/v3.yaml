# =====================================================================
# v3.yaml — ОТКЛОНЁННАЯ итерация enhance-aware fine-tuning
# =====================================================================
# Соответствует строке v3 (exdark_enhance_aware) в Таблице 20 ВКР.
# Результат: mAP@0.5 = 0,7678 (ExDark) / 0,6265 (RESIDE) / 0,5214 (COCO).
# Статус: **ОТКЛОНЕНА** — distribution mismatch с валидацией.
#
# Назначение: документирование отрицательного результата, который привёл
# к разработке безопасной конфигурации v4. Конфиг сохраняется для
# воспроизводимости отрицательного результата и обоснования выбора v4.
#
# Что пошло не так:
#   - RescueEnhancer применялся к каждому второму обучающему кадру (p=0.5);
#   - комбинация enhance × mosaic × mixup привела к сглаживанию текстур,
#     которые модель приняла за валидное входное распределение;
#   - на валидации (без enhance) модель показала падение mAP на 0,105
#     относительно v2 (с 0,8725 до 0,7678 на ExDark).
#
# Подробное обсуждение - подраздел 4.3 ВКР, абзац "Distribution mismatch".
# =====================================================================

experiment_name: yolo11_pose_v3_rejected
description: ОТКЛОНЕНА - enhance-aware с p=0.5 + mosaic/mixup конфликт

# Стартовые веса --------------------------------------------------------
weights_init: yolo11m.pt
data: experiments/configs/data_v3.yaml     # та же выборка, что v2

# Выход -----------------------------------------------------------------
project: runs_finetune_v3
name: exdark_enhance_aware

# Базовая гиперпараметризация ------------------------------------------
epochs: 60                   # остановлено руками после стагнации
imgsz: 1024
batch: 4
workers: 4
device: 0
cache: false
amp: true
patience: 60
val: true
plots: true
save_period: 5

# Оптимизатор и LR ------------------------------------------------------
optimizer: SGD
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3

# Заморозка -------------------------------------------------------------
freeze: 10

# Аугментации (ОСТАВЛЕНЫ ВКЛЮЧЁННЫМИ — основная ошибка v3) -------------
# Mosaic/mixup сшивают по 4 / 2 кадра в один. При наложении enhance
# с p=0.5 это даёт смесь обработанных и необработанных регионов
# в одном кадре, что нарушает целостность входного распределения.
mosaic: 0.5
mixup: 0.15
copy_paste: 0.1
close_mosaic: 10

# Цветовые
hsv_h: 0.02
hsv_s: 0.75
hsv_v: 0.45

flipud: 0.0
fliplr: 0.5

# =====================================================================
# Enhance-aware блок (КАСТОМНЫЙ TRAINER)
# =====================================================================
# Реализован через монки-патч метода YOLODataset.load_image:
#
#     orig_load = YOLODataset.load_image
#     def patched_load(self, i):
#         im, ratio, padding = orig_load(self, i)
#         if random.random() < cfg.enhance.probability:
#             im = RescueEnhancer(...).enhance(im)
#         return im, ratio, padding
#     YOLODataset.load_image = patched_load
#
# Проблема: эта вставка происходит ДО mosaic/mixup. То есть из 4 кадров
# мозаики ~2 уже улучшены, ~2 нет. Получается мешанина распределений.
enhance:
  enabled: true
  probability: 0.50          # СЛИШКОМ ВЫСОКО - источник distribution mismatch
  modes:
    - NIGHT
    - FOG
    - SMOKE
  use_scene_analyzer: true

# Параметры лосса
box: 7.5
cls: 0.5
dfl: 1.5
pose: 12.0
kobj: 1.0

single_cls: true

# =====================================================================
# Уроки, использованные в v4
# =====================================================================
# 1. enhance_probability снижена с 0.50 до 0.25
# 2. mosaic и mixup отключены полностью (mosaic=0, mixup=0)
# 3. Стартуем не с yolo11m.pt, а с уже сошедшихся весов v2
# 4. Заморожено больше слоёв (freeze=22 вместо 10) - дообучаем только head
# 5. lr0 снижен в 10 раз (с 0.001 до 0.0001) - мягкая дообучка
# 6. Эпох всего 25 (вместо 200+) - на старте с v2 не нужно больше
