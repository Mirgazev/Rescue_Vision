# =====================================================================
# v1.yaml — первая итерация дообучения YOLO11-pose
# =====================================================================
# Соответствует строке v1 (exdark_reside_v12) в Таблице 20 ВКР.
# Результат: mAP@0.5 = 0,8112 (ExDark) / 0,5827 (RESIDE) / 0,5225 (COCO).
# Статус: первый устойчивый прирост над базовой моделью (+0,087 на ExDark).
#
# Стратегия v1: первое fine-tuning с базовыми параметрами Ultralytics
# и умеренными аугментациями. Backbone заморожен первые 10 эпох для
# сохранения признаков, выученных на COCO. Дальше — постепенное
# размораживание и обучение всей сети.
# =====================================================================

experiment_name: yolo11_pose_v1
description: Первое дообучение - baseline fine-tuning configuration

# Стартовые веса --------------------------------------------------------
weights_init: yolo11m-pose.pt              # базовая модель Ultralytics
data: experiments/configs/data_v1.yaml     # ExDark ~70% + RESIDE ~20% + COCO ~10%

# Выход -----------------------------------------------------------------
project: runs_finetune
name: exdark_reside_v12

# Базовая гиперпараметризация ------------------------------------------
epochs: 200                  # ограничение сверху; early stop ~29-59 эпохах
imgsz: 1024                  # GPU >= 8 GB; иначе 768 (см. логику в 0105train.PY)
batch: 4                     # подбор под VRAM 6 ГБ RTX 2060
workers: 4
device: 0
cache: false
amp: true                    # FP16 для экономии VRAM
patience: 100                # длинный patience - даём модели расти
val: true
plots: true
save_period: 10

# Оптимизатор и LR ------------------------------------------------------
optimizer: SGD               # YOLO лучше работает с SGD
lr0: 0.001
lrf: 0.01                    # финальный множитель LR
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3

# Заморозка -------------------------------------------------------------
# Замораживаем первые 10 слоёв (backbone) на старте.
# В Ultralytics 8.x параметр freeze применяется к первым N слоям.
freeze: 10

# Аугментации -----------------------------------------------------------
# Умеренные. На v1 ещё не было выявлено проблем с mosaic/mixup,
# поэтому они оставлены включёнными.
mosaic: 0.5
mixup: 0.15
copy_paste: 0.1
close_mosaic: 10             # отключить mosaic за 10 эпох до конца

# Цветовые аугментации (умеренные)
hsv_h: 0.02
hsv_s: 0.75
hsv_v: 0.45

# Геометрические (отключены — конфликтуют с pose keypoints)
flipud: 0.0
fliplr: 0.5
degrees: 0.0
translate: 0.0
scale: 0.0
shear: 0.0
perspective: 0.0

# Параметры лосса (стандартные для YOLO11-pose) ------------------------
box: 7.5
cls: 0.5
dfl: 1.5
pose: 12.0
kobj: 1.0

# Класс обучения -------------------------------------------------------
single_cls: true             # обучаем только person (id = 0)

# =====================================================================
# Аппаратная база (для воспроизводимости)
# =====================================================================
# CPU       : 13th Gen Intel Core i5-13420H
# GPU       : NVIDIA GeForce RTX 2060, 6 GiB VRAM
# CUDA      : 12.8 (PyTorch) / 13.2 (driver)
# Python    : 3.13.11
# PyTorch   : 2.10.0
# Ultralytics: 8.4.14
