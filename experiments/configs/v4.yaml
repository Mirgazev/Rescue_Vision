# =====================================================================
# v4.yaml — ФИНАЛЬНАЯ конфигурация enhance-aware fine-tuning
# =====================================================================
# Соответствует строке v4 (exdark_enhance_aware_safe2) в Таблице 20 ВКР.
# Результат: mAP@0.5 = 0,8905 (ExDark) / 0,6749 (RESIDE) / 0,5646 (COCO).
# Статус: ФИНАЛЬНАЯ. Все целевые показатели ТЗ достигнуты.
#
# Стратегия v4 - три безопасных изменения относительно отклонённой v3:
#   1. Старт с весов v2 (а не с базовой yolo11m.pt). Это сохраняет уже
#      выученные на ExDark + RESIDE признаки.
#   2. Отключены все смешивающие аугментации (mosaic=0, mixup=0).
#      Именно их комбинация с enhance дала distribution mismatch в v3.
#   3. Снижена вероятность RescueEnhancer до 0.25 и заморожены первые
#      22 слоя. Дообучается только head и верхние слои neck.
# =====================================================================

experiment_name: yolo11_pose_v4
description: ФИНАЛЬНАЯ конфигурация enhance-aware safe для rescue_vision

# Стартовые веса --------------------------------------------------------
weights_init: ./weights/v2_best.pt         # ВАЖНО: стартуем с весов v2,
                                            # а не с базовой yolo11m.pt
data: experiments/configs/data_v4.yaml     # та же выборка, что v2

# Выход -----------------------------------------------------------------
project: runs_finetune_v4
name: exdark_enhance_aware_safe2

# Базовая гиперпараметризация ------------------------------------------
epochs: 25                   # достаточно при старте с уже сошедшихся весов
imgsz: 768                   # совпадает с inference - см. Таблица 5 ВКР
batch: 4
workers: 4
device: 0
cache: false
amp: true                    # FP16
patience: 25
val: true
plots: true
save_period: 5

# Оптимизатор и LR ------------------------------------------------------
optimizer: SGD
lr0: 0.0001                  # 1e-4 - мягкая дообучка (в 10 раз меньше v2)
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 0             # прогрев не нужен - стартуем с сошедшихся весов

# Заморозка -------------------------------------------------------------
# Замораживаем первые 22 слоя - backbone и нижние слои neck.
# Дообучаемой остаётся только head и верхние слои neck.
freeze: 22

# Аугментации — смешивающие ОТКЛЮЧЕНЫ ---------------------------------
# Это критическое изменение относительно v3.
mosaic: 0.0
mixup: 0.0
copy_paste: 0.0
close_mosaic: 0              # параметр не действует при mosaic=0

# Геометрические — отключены
degrees: 0.0
translate: 0.0
scale: 0.0
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5                  # горизонтальный flip оставлен (безопасный)

# Цветовые — минимально допустимые
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4

# Параметры детекции / лосса ------------------------------------------
conf: 0.25
iou: 0.5
box: 7.5
cls: 0.5
dfl: 1.5
pose: 12.0
kobj: 1.0

# =====================================================================
# Enhance-aware блок (БЕЗОПАСНАЯ конфигурация)
# =====================================================================
# RescueEnhancer применяется к 25% обучающих кадров через патч
# load_image класса YOLODataset. Поскольку mosaic/mixup отключены,
# каждый обучающий кадр представляет собой целостное распределение
# (или полностью улучшённое, или полностью оригинальное), без смеси.
enhance:
  enabled: true
  probability: 0.25          # снижено с 0.50 (v3) до 0.25
  modes:
    - NIGHT
    - FOG
    - SMOKE
  use_scene_analyzer: true   # тип режима определяется ImprovedSceneAnalyzer
                              # для конкретного кадра; OFF-кадры
                              # не модифицируются

# =====================================================================
# Класс обучения и воспроизводимость
# =====================================================================
single_cls: true             # обучаем только person (id = 0)
seed: 0
deterministic: true

# =====================================================================
# Аппаратная база
# =====================================================================
# CPU       : 13th Gen Intel Core i5-13420H
# GPU       : NVIDIA GeForce RTX 2060, 6 GiB VRAM
# CUDA      : 12.8 (PyTorch) / 13.2 (driver)
# Python    : 3.13.11
# PyTorch   : 2.10.0
# Ultralytics: 8.4.14
# OS        : Ubuntu 24.04.4 LTS
