# =====================================================================
# v2.yaml — стабилизированная итерация дообучения YOLO11-pose
# =====================================================================
# Соответствует строке v2 (exdark_fixed) в Таблице 20 ВКР.
# Результат: mAP@0.5 = 0,8725 (ExDark) / 0,6654 (RESIDE) / 0,5534 (COCO).
# Статус: стабильная конфигурация, прирост +0,061 над v1 на ExDark.
#
# Что изменено относительно v1:
#   - убран эксперимент с AdamW и weight_decay - вернулись к SGD
#     (стандарт для YOLO);
#   - убраны проблемные геометрические аугментации
#     (perspective, degrees, shear, translate) - они вступали
#     в конфликт с pose keypoints;
#   - cache=False (надёжнее с кириллическими путями);
#   - amp=True (FP16 для экономии VRAM).
# =====================================================================

experiment_name: yolo11_pose_v2
description: Стабилизированное дообучение с исправленными гиперпараметрами

# Стартовые веса --------------------------------------------------------
weights_init: yolo11m.pt                   # ВАЖНО: стартуем с базовой модели,
                                            # а не продолжаем с v1
data: experiments/configs/data_v2.yaml     # ExDark ~80% + RESIDE/COCO ~20%

# Выход -----------------------------------------------------------------
project: runs_finetune_v2
name: exdark_fixed

# Базовая гиперпараметризация ------------------------------------------
epochs: 200                  # ограничение сверху; остановлено вручную на эпохе 137
imgsz: 1024                  # подбирается в коде под VRAM (1024 / 768)
batch: 4
workers: 4
device: 0
cache: false
amp: true
patience: 100
val: true
plots: true
save_period: 10

# Оптимизатор и LR ------------------------------------------------------
optimizer: SGD               # вернулись с AdamW (см. notes ниже)
lr0: 0.001                   # вернули с 0.0005 - дало рост mAP
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3

# Заморозка -------------------------------------------------------------
freeze: 10                   # backbone первые 10 эпох

# Аугментации -----------------------------------------------------------
# Возвращены умеренные значения из успешной v1.
mosaic: 0.5                  # было 0.8 в промежуточной попытке - откатили
mixup: 0.15                  # было 0.1 - вернули 0.15
copy_paste: 0.1
close_mosaic: 10

# Цветовые аугментации
hsv_h: 0.02
hsv_s: 0.75
hsv_v: 0.45

# Геометрические — ОТКЛЮЧЕНЫ
# В промежуточной попытке были добавлены perspective=0.05, degrees=5,
# shear=2, translate=0.1 — они дали падение mAP на 5-8 п.п. на ExDark
# (геометрические преобразования ломают keypoints pose-разметки).
# В финале v2 они УБРАНЫ.
flipud: 0.0
fliplr: 0.5
degrees: 0.0
translate: 0.0
scale: 0.0
shear: 0.0
perspective: 0.0

# Параметры лосса -------------------------------------------------------
box: 7.5
cls: 0.5
dfl: 1.5
pose: 12.0
kobj: 1.0

# Класс обучения -------------------------------------------------------
single_cls: true

# =====================================================================
# Notes: что НЕ работает (вынесено в комментарии)
# =====================================================================
# В промежуточной попытке v1.5 пробовали:
#   optimizer: AdamW
#   weight_decay: 0.0005
# Результат: mAP@0.5 на ExDark просел до 0.79 (с 0.81 у v1).
# YOLO архитектура оптимизирована под SGD-style градиенты,
# AdamW дал worse конвергенцию. Удалено из v2.
#
# Также пробовали blur=0.01, median_blur=0.01 — они дали
# дополнительные 0.005-0.01 mAP, но создавали шум при работе на
# CPU-станциях. В финале v2 — отключены.
